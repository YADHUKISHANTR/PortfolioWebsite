<script>
document.addEventListener("DOMContentLoaded", function () {

    const iframes = document.querySelectorAll("iframe[data-src]");

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const iframe = entry.target;

            if (entry.isIntersecting) {

                // Load only once
                if (!iframe.hasAttribute("data-loaded")) {

                    iframe.setAttribute("data-loaded", "true");

                    // small delay to reduce UI flash
                    setTimeout(() => {
                        const baseSrc = iframe.dataset.src;

                        // ensure autoplay is added AFTER load
                        if (!baseSrc.includes("autoplay")) {
                            iframe.src = baseSrc + "&autoplay=1";
                        } else {
                            iframe.src = baseSrc;
                        }

                    }, 150);
                }

            } else {

                // OPTIONAL: unload when out of view
                iframe.removeAttribute("src");
                iframe.removeAttribute("data-loaded");

            }
        });
    }, {
        threshold: 0.3,
        rootMargin: "200px"
    });

    iframes.forEach(iframe => observer.observe(iframe));

});
</script>
